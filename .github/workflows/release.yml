name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      # Guard against tagging without bumping versions: publish is idempotent,
      # so a stale version would otherwise silently release nothing.
      - name: Check tag matches package versions
        run: |
          version="${GITHUB_REF_NAME#v}"
          py=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)
          js=$(node -p "require('./web/demucs/package.json').version")
          test "$py" = "$version" || { echo "pyproject.toml has $py, tag is $version"; exit 1; }
          test "$js" = "$version" || { echo "web/demucs/package.json has $js, tag is $version"; exit 1; }
      - name: Sync Python dependencies
        run: uv sync --locked --extra dev --extra onnx --group onnx-test
      - name: Verify locked Cog requirements
        run: |
          uv export --locked --no-dev --no-hashes --no-emit-project --format requirements-txt > /tmp/requirements-cog.txt
          diff -u requirements-cog.txt /tmp/requirements-cog.txt
      - name: Check Python style
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Run Python tests
        run: uv run pytest -m "not slow" -q
      - name: Build Python distributions
        run: uv build
      - name: Verify wheel contents
        run: |
          listing=$(unzip -l dist/*.whl)
          echo "$listing" | grep -q "unblend/metadata.json"
          echo "$listing" | grep -qi "licenses/LICENSE"
          for kernel in unblend/metal/*.metal; do
            echo "$listing" | grep -q "$kernel"
          done
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Test and build web packages
        working-directory: web
        run: |
          npm test
          npm run build
          npm run lint -w demucs-app
          npm audit --omit=dev --audit-level=high
      - name: Pack npm package
        run: |
          mkdir -p release-artifacts
          cd web
          npm pack -w unblend --pack-destination ../release-artifacts
      - name: Upload Python distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error
      - name: Upload npm package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-package
          path: release-artifacts/*.tgz
          if-no-files-found: error

  publish:
    needs: preflight
    runs-on: ubuntu-latest
    # Configure trusted publishers for package "unblend", this workflow, and
    # environment "release" on both npm and PyPI. npm's first package version
    # must still be published manually before trusted publishing can be enabled.
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # npm >= 11.5 is required for OIDC trusted publishing.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Download Python distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-distributions
          path: dist
      - name: Download npm package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: npm-package
          path: release-artifacts
      - name: Publish to npm
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          set +e
          published=$(npm view "unblend@$version" version --json 2>npm-view.err)
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "unblend@$version already published ($published); skipping."
          elif grep -q "E404" npm-view.err; then
            npm publish "release-artifacts/unblend-$version.tgz" --provenance --access public
          else
            cat npm-view.err >&2
            exit "$status"
          fi
      - name: Publish to PyPI
        # --check-url makes reruns idempotent: files already on PyPI are
        # skipped instead of erroring.
        run: uv publish --check-url https://pypi.org/simple/ dist/*

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Extract changelog section for this version
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            /^## / { found = ($2 == ver); next }
            found { print }
          ' changelog.md > release-notes.md
          test -s release-notes.md || echo "See changelog.md." > release-notes.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; skipping."
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          fi
