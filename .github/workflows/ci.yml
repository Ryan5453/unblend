name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Run fast tests
        run: uv run pytest -m "not slow" -q

  # Apple Silicon runner: exercises the custom Metal kernels on a real MPS
  # device (they are skipped on the Linux jobs).
  test-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install FFmpeg
        run: brew install ffmpeg
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Run fast tests (incl. Metal kernels on MPS)
        run: uv run pytest -m "not slow" -q

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: uv build
      - name: Verify wheel contents
        run: |
          listing=$(unzip -l dist/*.whl)
          echo "$listing" | grep -q "demucs/metadata.json"
          echo "$listing" | grep -qi "licenses/LICENSE"
          for kernel in demucs/metal/*.metal; do
            echo "$listing" | grep -q "$kernel"
          done

  onnx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies (with onnx extra)
        run: uv sync --extra dev --extra onnx
      - name: Smoke-test ONNX import
        run: uv run python -c "import onnx; import demucs.onnx; print('onnx', onnx.__version__)"
      - name: Run ONNX tests
        run: uv run pytest -m "not slow" -q tests/test_onnx_stft.py

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build library and app
        run: npm run build
