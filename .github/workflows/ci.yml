name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --extra dev
      - name: Verify locked Cog requirements
        run: |
          uv export --locked --no-dev --no-hashes --no-emit-project --format requirements-txt > /tmp/requirements-cog.txt
          diff -u requirements-cog.txt /tmp/requirements-cog.txt
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --locked --extra dev
      - name: Run fast tests
        run: uv run pytest -m "not slow" -q

  # Apple Silicon runner: exercises the custom Metal kernels on a real MPS
  # device (they are skipped on the Linux jobs).
  test-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Install FFmpeg
        run: brew install ffmpeg
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --locked --extra dev
      - name: Run fast tests (incl. Metal kernels on MPS)
        run: uv run pytest -m "not slow" -q

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: uv build
      - name: Verify wheel contents
        run: |
          listing=$(unzip -l dist/*.whl)
          echo "$listing" | grep -q "unblend/metadata.json"
          echo "$listing" | grep -qi "licenses/LICENSE"
          for kernel in unblend/metal/*.metal; do
            echo "$listing" | grep -q "$kernel"
          done

  onnx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - name: Sync dependencies (with onnx test group)
        run: uv sync --locked --extra dev --extra onnx --group onnx-test
      - name: Smoke-test ONNX import
        run: uv run python -c "import onnx; import unblend.onnx; import onnxruntime; print('onnx', onnx.__version__, 'ort', onnxruntime.__version__)"
      - name: Run ONNX tests
        run: uv run pytest -m "not slow" -q tests/test_onnx_stft.py tests/test_onnx_roformer.py

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test browser library
        run: npm test
      - name: Build library and app
        run: npm run build
      - name: Lint app
        run: npm run lint -w demucs-app
